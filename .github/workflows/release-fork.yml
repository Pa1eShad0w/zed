name: Release (Fork)

# Spec: docs/fork-update-system.spec.md §9 (GitHub Actions release pipeline)
# Plan: docs/fork-update-system.plan.md Phase K
#
# Trigger: pushing a tag of the form vX.Y.Z-fork.N (created by script/bump-fork-version.{ps1,sh}).
# Produces: a GitHub Release with the Windows x64 installer + SHA256SUMS.txt; body
# is the bump commit body extracted via `git show -s --format=%b`.
#
# No code signing. Spec §6 row 6: 'SHA256 hash 校验（信任内网服务器；不上 minisign/code-signing）'.
# Because script/bundle-windows.ps1 enters its signing / Azure / Sentry branches
# whenever $env:CI is truthy, the bundle step explicitly clears CI before
# invoking the script — see the comment on that step.

on:
  push:
    tags:
      - 'v*.*.*-fork.*'

  # Manual trigger for testing / re-running a published tag without forcing a
  # delete-and-recreate of the tag. Defaults to dry_run=true so an accidental
  # "Run workflow" click does NOT overwrite a real release. Set dry_run=false
  # to actually publish.
  #
  # When invoked from the UI:
  #   - Select branch / tag via the standard "Use workflow from" dropdown.
  #     The job uses GITHUB_REF_NAME for everything (checkout + release notes
  #     extraction + Release creation), so if you want to publish for a tag,
  #     pick that tag in the dropdown.
  #   - Tag input is required ONLY when invoked from a branch ref (the workflow
  #     needs to know which tag's commit body holds the release notes; see
  #     release notes step). When invoked from a tag ref, leave tag blank.
  workflow_dispatch:
    inputs:
      tag:
        description: |
          Tag to publish (e.g. v1.8.2-fork.0). REQUIRED when the workflow is
          run from a branch ref; LEAVE BLANK when run from a tag ref (the ref
          itself is the tag). Must already exist as a git tag in the repo.
        required: false
        type: string
        default: ''
      dry_run:
        description: |
          If true (default), build the installer + compute SHA256SUMS +
          extract release notes, but SKIP the GitHub Release publish step.
          Use this for end-to-end smoke testing of the build pipeline without
          shadowing a real release. Set false to actually publish.
        required: true
        type: boolean
        default: true

concurrency:
  # Spec §9.1: same-tag re-push queues; never cancel a half-uploaded release.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      # Required by softprops/action-gh-release to create the GH Release.
      contents: write
    # 12h cap (was 90 min). A cold cargo+LLVM compile of the full Zed workspace
    # on stock 4-vCPU/16GB windows-latest is the bottleneck — local 8-core box
    # takes ~30 min, CI 4-core is roughly 2x, plus first-run cache misses.
    # The 90-min cap fired before the build even reached the final `zed` crate
    # (was still in wide-fanout phase at cancellation). 12h gives generous
    # headroom for cold runs + Inno + makeAppx + GH Release upload.
    timeout-minutes: 720
    steps:
      - name: Checkout (full history for `git show <tag>`)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is required so `git show -s --format=%b <tag>` can
          # read the bump commit body (which is the release-notes source per
          # spec §9 / §10).
          fetch-depth: 0

      - name: Enable Windows long paths (cargo git checkout workaround)
        # Some upstream deps (e.g. microsoft/python-environment-tools via the
        # `pet` crate) ship test fixtures with file paths whose absolute form
        # under cargo's checkout dir exceeds the legacy 260-char MAX_PATH.
        # cargo's bundled libgit2 errors with "path too long" on Windows
        # unless long-path support is enabled.
        #
        # Three layers, all required:
        #   1. Filesystem-level: HKLM\SYSTEM\CurrentControlSet\Control\FileSystem
        #      LongPathsEnabled=1 (already set on recent GH images; force).
        #   2. Git: core.longpaths=true (libgit2 honours this via the global
        #      config since libgit2 1.6+).
        #   3. cargo: CARGO_NET_GIT_FETCH_WITH_CLI=true so cargo shells out to
        #      the system git CLI for fetches (which respects long paths
        #      more reliably than libgit2 in edge cases).
        shell: pwsh
        run: |
          git config --global core.longpaths true
          try {
            New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
              -Name "LongPathsEnabled" -PropertyType DWORD -Value 1 -Force | Out-Null
            Write-Host "LongPathsEnabled = 1"
          } catch {
            Write-Host "Could not set LongPathsEnabled (may already be set or not admin): $_"
          }
          "CARGO_NET_GIT_FETCH_WITH_CLI=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        # `rustup show` triggers rustup to install the channel + targets +
        # components declared in rust-toolchain.toml. No version pinning here —
        # rust-toolchain.toml is the single source of truth.
        run: rustup show
        shell: pwsh

      - name: Cache cargo build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Start memory + disk monitor (background)
        # Local measurement shows the final `zed` crate's single rustc process
        # peaks at ~16.2 GB working set under stock cargo settings
        # (codegen-units=16 + lto=thin), right at the stock GH runner's 16 GB
        # RAM cap. We need the live timeline from CI to know whether the
        # process actually OOMs, swaps, or somehow squeezes through, AND to
        # see disk water-mark on the runner's small SSD.
        #
        # Approach: spawn a hidden PowerShell process that samples every 15s
        # and appends to a CSV under $RUNNER_TEMP. The build step proceeds
        # uninterrupted. A teardown step (with if: always()) reads the CSV,
        # prints peak/min summaries, and uploads the raw CSV as an artifact
        # for later analysis.
        shell: pwsh
        run: |
          $monitorScript = Join-Path $env:RUNNER_TEMP 'monitor.ps1'
          $monitorLog    = Join-Path $env:RUNNER_TEMP 'build-mem.csv'
          $monitorPidF   = Join-Path $env:RUNNER_TEMP 'monitor.pid'

          @'
          $ErrorActionPreference = 'Continue'
          $logCsv = $args[0]
          "timestamp,rustc_count,link_count,total_ws_mb,peak_proc,peak_ws_mb,avail_mb,disk_free_gb" | Out-File $logCsv -Encoding ASCII
          while ($true) {
              $now = Get-Date -Format 'HH:mm:ss'
              $procs = Get-Process rustc, link, lld-link, cargo, cl, cmd, ISCC, makeappx -ErrorAction SilentlyContinue
              $rustcCount = @($procs | Where-Object Name -EQ 'rustc').Count
              $linkCount  = @($procs | Where-Object { $_.Name -in 'link','lld-link' }).Count
              $totalWsMB  = if ($procs) { [math]::Round(($procs | Measure-Object WorkingSet64 -Sum).Sum / 1MB, 1) } else { 0 }
              $peakProc   = $procs | Sort-Object WorkingSet64 -Descending | Select-Object -First 1
              $peakName   = if ($peakProc) { $peakProc.Name } else { 'none' }
              $peakWs     = if ($peakProc) { [math]::Round($peakProc.WorkingSet64 / 1MB, 1) } else { 0 }
              $avail      = (Get-Counter '\Memory\Available MBytes' -ErrorAction SilentlyContinue).CounterSamples.CookedValue
              $avail      = if ($avail) { [math]::Round($avail, 0) } else { 0 }
              $diskGB     = try { [math]::Round((Get-PSDrive C -ErrorAction Stop).Free / 1GB, 1) } catch { 0 }
              "$now,$rustcCount,$linkCount,$totalWsMB,$peakName,$peakWs,$avail,$diskGB" | Out-File $logCsv -Append -Encoding ASCII
              Start-Sleep -Seconds 15
          }
          '@ | Out-File $monitorScript -Encoding ASCII

          $proc = Start-Process pwsh `
                    -ArgumentList '-NoProfile','-WindowStyle','Hidden','-File',$monitorScript,$monitorLog `
                    -WindowStyle Hidden -PassThru
          $proc.Id | Out-File $monitorPidF -Encoding ASCII
          "MONITOR_PID=$($proc.Id)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MONITOR_LOG=$monitorLog" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "monitor started, pid=$($proc.Id), log=$monitorLog"

      - name: Build installer (cargo + Inno Setup)
        # bundle-windows.ps1 does:
        #   - cargo build --release --target x86_64-pc-windows-msvc for
        #     zed, cli, auto_update_helper, explorer_command_injector, remote_server
        #   - makeAppx, Inno Setup compile
        #   - writes `SETUP_PATH=target/Zed-Fork-x86_64.exe` to $GITHUB_ENV
        #
        # We deliberately clear $env:CI before invoking the script. With CI
        # set, bundle-windows.ps1 demands Azure Trusted Signing secrets
        # (AZURE_TENANT_ID, CERT_PROFILE_NAME, etc.) and calls sign.ps1 +
        # sentry-cli. Per spec §6 row 6, fork releases are unsigned (trust is
        # rooted in the intranet server + client-side SHA256 verification);
        # we have no Azure secrets and no Sentry project for this fork.
        # GITHUB_ENV is a separate env var and is still honoured by the
        # `Write-Output ... >> $env:GITHUB_ENV` line in BuildInstaller.
        shell: pwsh
        env:
          RELEASE_CHANNEL: fork
        run: |
          $env:CI = ''
          ./script/bundle-windows.ps1 -Architecture x86_64

      - name: Stop monitor + print resource summary
        # Always runs (even on build failure) so the resource timeline survives
        # an OOM or timeout. Kills the background sampler, parses the CSV, and
        # echos peaks + the last 20 samples (the post-mortem window).
        if: always()
        shell: pwsh
        run: |
          if ($env:MONITOR_PID) {
              try {
                  Stop-Process -Id $env:MONITOR_PID -Force -ErrorAction Stop
                  Write-Host "monitor pid=$($env:MONITOR_PID) stopped"
              } catch {
                  Write-Host "monitor pid=$($env:MONITOR_PID) was already gone: $_"
              }
          } else {
              Write-Host "no MONITOR_PID in env — monitor was not started or env was clobbered"
          }
          if (-not $env:MONITOR_LOG -or -not (Test-Path $env:MONITOR_LOG)) {
              Write-Host "no monitor log to summarise"
              exit 0
          }
          $rows = Import-Csv $env:MONITOR_LOG
          if (-not $rows) {
              Write-Host "monitor log is empty"
              exit 0
          }
          $peakTotal  = ($rows | Measure-Object {[double]$_.total_ws_mb} -Max).Maximum
          $singlePeak = $rows | Sort-Object {[double]$_.peak_ws_mb} -Descending | Select-Object -First 1
          $maxRustc   = ($rows | Measure-Object {[int]$_.rustc_count} -Max).Maximum
          $minAvail   = ($rows | Measure-Object {[double]$_.avail_mb} -Min).Minimum
          $minDisk    = ($rows | Measure-Object {[double]$_.disk_free_gb} -Min).Minimum
          $samples    = $rows.Count
          Write-Host "===== resource summary ====="
          Write-Host ("samples (15s each): {0}  (~{1:N1} min observed)" -f $samples, ($samples * 15 / 60))
          Write-Host ("peak combined WS (all rustc + link + cargo + cl + iscc): {0} MB" -f $peakTotal)
          Write-Host ("single-process peak: {0} MB ({1}) at {2}" -f $singlePeak.peak_ws_mb, $singlePeak.peak_proc, $singlePeak.timestamp)
          Write-Host ("max concurrent rustc: {0}" -f $maxRustc)
          Write-Host ("min available system RAM: {0} MB" -f $minAvail)
          Write-Host ("min disk free (C:): {0} GB" -f $minDisk)
          Write-Host ""
          Write-Host "===== last 20 samples (post-mortem window) ====="
          $rows | Select-Object -Last 20 | Format-Table -AutoSize

      - name: Upload monitor CSV (artefact)
        # Keeps the raw timeline available for download for ~14 days even
        # after the workflow run is gone from the UI active-runs list.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-mem-monitor
          path: ${{ env.MONITOR_LOG }}
          retention-days: 14
          if-no-files-found: warn

      - name: Stage artefacts and compute SHA256SUMS
        # Spec §6 / §9: emit SHA256SUMS.txt with `sha256sum -b` (binary mode,
        # `<hex> *<file>` format) so the worker's parser (§6) accepts it.
        # fail_on_unmatched_files in the release step catches a missing installer,
        # but we still guard here so we fail fast with a clearer message.
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ -z "${SETUP_PATH:-}" ]; then
            echo "bundle-windows.ps1 did not export SETUP_PATH to GITHUB_ENV" >&2
            exit 1
          fi
          if [ ! -f "${SETUP_PATH}" ]; then
            echo "SETUP_PATH (${SETUP_PATH}) does not point to a file" >&2
            exit 1
          fi
          cp "${SETUP_PATH}" dist/
          cd dist
          # `sha256sum -b *.exe` — spec §6 mandates binary mode. The worker
          # validates `^[0-9a-fA-F]{64}\s+\*?<file>$` per line.
          sha256sum -b *.exe > SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt
          echo "--- end ---"

      - name: Resolve target tag
        # workflow_dispatch from a branch ref needs an explicit tag input.
        # tag push uses GITHUB_REF_NAME directly. Sets $TAG_NAME in env for
        # the next steps.
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            # validate the supplied tag actually exists locally (fetched via depth 0)
            if ! git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
              echo "supplied tag '${TAG}' does not exist in the repo" >&2
              exit 1
            fi
            # validate it matches our spec §3.5 fork-tag pattern
            if ! echo "${TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+-fork\.[0-9]+$'; then
              echo "tag '${TAG}' does not match the fork-tag pattern v<semver>-fork.<N>" >&2
              exit 1
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "TAG_NAME=${TAG}" >> "$GITHUB_ENV"
          echo "Resolved release tag: ${TAG}"

      - name: Extract release notes from bump commit body
        # Spec §9 / row 9 of §2: release notes live in the bump commit message
        # body (English ASCII-only, enforced both locally by bump scripts and
        # here by CI). `git show -s --format=%b <tag>` is the canonical extractor.
        shell: bash
        run: |
          set -euo pipefail
          git show -s --format=%b "${TAG_NAME}" > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "release notes are empty for tag ${TAG_NAME}" >&2
            echo "(bump scripts should have refused to commit an empty body)" >&2
            exit 1
          fi
          # ASCII-only guard. Anything outside 0x00-0x7F means the bump scripts'
          # local guard failed or the commit was created by hand.
          if LC_ALL=C grep -P '[^\x00-\x7F]' release-notes.md >/dev/null 2>&1; then
            echo "release notes contain non-ASCII characters" >&2
            echo "spec §2 row 9 + §10: release notes MUST be English ASCII-only" >&2
            exit 1
          fi
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Publish GitHub Release
        # softprops/action-gh-release@v2 creates (or updates, if the workflow
        # is re-run for the same tag) the GH Release. fail_on_unmatched_files
        # turns a missing installer / SHA256SUMS into a hard failure so the
        # worker never sees a partial release (spec §9.2 / §13).
        #
        # workflow_dispatch dry_run=true skips this step so the build path
        # can be smoke-tested without overwriting an existing Release.
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          body_path: release-notes.md
          files: |
            dist/*.exe
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true

      - name: Dry-run summary
        # When skipping the publish step, print the artefacts + release notes
        # to the workflow log so the operator can review what would have been
        # published.
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        shell: bash
        run: |
          echo "::notice title=Dry-run::Skipping GitHub Release publish for ${TAG_NAME}."
          echo "--- Artefacts that WOULD have been uploaded ---"
          ls -la dist/
          echo "--- Release notes body ---"
          cat release-notes.md
          echo "--- end dry-run summary ---"
